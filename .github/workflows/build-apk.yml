name: Build DMVP APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"
          cache-disabled: true

      - name: Run unit tests and build debug APK
        run: |
          cd dmvp-android
          set +e
          gradle clean testDebugUnitTest assembleDebug --stacktrace --info > build.log 2>&1
          GRADLE_EXIT=$?
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "BUILD_FAILED=true" >> $GITHUB_ENV
          fi
          echo "---- REAL COMPILER ERRORS (if any) ----"
          grep -n "^e:" build.log || echo "No e: lines found"
          echo "---- UNIT TEST SUMMARY ----"
          grep -n "HashUtilsTest\|FAILED\|BUILD SUCCESSFUL\|BUILD FAILED" build.log || true
          echo "---- LAST 150 LINES OF LOG ----"
          tail -150 build.log
          exit 0

      - name: Fail if build failed
        if: env.BUILD_FAILED == 'true'
        run: exit 1

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: dmvp-android/build.log

      - name: Upload APK
        if: env.BUILD_FAILED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dmvp-debug-apk
          path: dmvp-android/app/build/outputs/apk/debug/app-debug.apk
